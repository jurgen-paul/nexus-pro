<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pricing Plans</title>
    <script src="https://js.stripe.com/v3/"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Pricing Plans</h1>
    <div class="pricing-container">
        <div class="plan-card" id="silver-plan">
            <h2>Silver Plan</h2>
            <p>Price: $19/month</p>
            <button onclick="handleCheckout('silver')">Select</button>
        </div>
        <div class="plan-card" id="gold-plan">
            <h2>Gold Plan</h2>
            <p>Price: $39/month</p>
            <button onclick="handleCheckout('gold')">Select</button>
        </div>
        <div class="plan-card" id="platinum-plan">
            <h2>Platinum Plan</h2>
            <p>Price: $59/month</p>
            <button onclick="handleCheckout('platinum')">Select</button>
        </div>
    </div>
    <script src="pricing.js"></script>
</body>
</html>
